name: Supabase Keep Alive

on:
  schedule:
    - cron: "0 0 */5 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health check
        run: |
          curl --fail --silent --show-error \
            "https://ybtljftcxoejpbfmzcvy.supabase.co/auth/v1/health"
          echo "Supabase pinged successfully!"
